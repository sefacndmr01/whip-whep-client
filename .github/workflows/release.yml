name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  version:
    name: Version Packages
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      hasChangesets: ${{ steps.changesets.outputs.hasChangesets }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
        env:
          HUSKY: 0

      - name: Create Release Pull Request
        id: changesets
        uses: changesets/action@v1
        with:
          version: npm run version
          commit: 'chore: version packages'
          title: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HUSKY: 0

  publish-npm:
    name: Publish to npm
    needs: version
    if: needs.version.outputs.hasChangesets == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm
        run: |
          TARBALL=$(curl -sf https://registry.npmjs.org/npm/latest | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>process.stdout.write(JSON.parse(d).dist.tarball))")
          NPM_DIR=$(node -e "process.stdout.write(require('path').resolve(process.execPath,'../../lib/node_modules/npm'))")
          curl -sf "$TARBALL" | tar xz --strip-components=1 -C "$NPM_DIR"
          npm --version

      - run: npm ci
        env:
          HUSKY: 0

      - run: npm publish --provenance --access public
        env:
          HUSKY: 0

      - name: Create git tag
        run: |
          VERSION=$(node -p "require('./package.json').version")
          git tag "v${VERSION}"
          git push origin "v${VERSION}"

  publish-gpr:
    name: Publish to GitHub Packages
    needs: publish-npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: 'https://npm.pkg.github.com'

      - run: npm ci
        env:
          HUSKY: 0

      - run: |
          npm pkg set name="@sefacndmr01/whip-whep-client"
          npm publish --ignore-scripts
          npm pkg set name="whip-whep-client"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HUSKY: 0
